<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paylaşılanlar — Himmet &amp; Cennet</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="wrap wide">
<nav class="top-nav" aria-label="Sayfa">
<a class="btn btn-secondary" href="/">← Yükleme sayfası</a>
</nav>
<header class="gallery-header">
<h1>Paylaşılanlar</h1>
<p>Bugün eklenen fotoğraf ve videolar</p>
</header>
<main>
{% if not items %}
<div class="empty-gallery card">
  <p>Henüz paylaşım yok.<br />İlk siz ekleyin.</p>
  <a class="btn btn-primary btn-send btn-block" href="/">Yükleme sayfası</a>
</div>
{% else %}
<div class="gallery-grid">
  {% for item in items %}
  <div class="gallery-item">
    {% if item.is_image %}
    <img src="{{ item.url }}" class="media" alt="Fotoğraf" loading="lazy" decoding="async" />
    {% elif item.is_video %}
    <iframe
      src="{{ item.url }}"
      class="media"
      allow="autoplay; fullscreen"
      title="Video"
      loading="lazy"
    ></iframe>
    {% else %}
    <div class="gallery-item--file">
      <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer" class="file-link">📄 Dosyayı görüntüle</a>
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
</main>
</div>
</body>
</html>
